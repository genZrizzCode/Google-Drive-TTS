<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drive PDF Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <h1>Drive PDF Reader</h1>
        <p class="subtitle">Read Google Drive PDFs with built-in speech</p>
      </header>

      <div class="button-group">
        <button id="readBtn" class="btn btn-primary" type="button">Read Current PDF</button>
        <button id="stopBtn" class="btn btn-danger" type="button">Stop</button>
      </div>

      <div id="status" class="status">Ready</div>

      <div class="text-area-container">
        <label for="preview">Extracted Text</label>
        <textarea id="preview" placeholder="Extracted text will appear here..." readonly></textarea>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
